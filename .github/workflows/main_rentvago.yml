# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Bun app to Azure Web App - rentvago

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies with Bun
        run: bun install --frozen-lockfile

      - name: Build app if present
        run: |
          if bun -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then
            bun run build
          else
            echo "No build script found, skipping build"
          fi

      - name: Prepare standalone package
        run: |
          rm -rf .deploy
          mkdir -p .deploy/.next
          cp -R .next/standalone/. .deploy/
          cp -R .next/static .deploy/.next/static
          if [ -d public ]; then
            cp -R public .deploy/public
          fi

      - name: Test app if present
        run: |
          if bun -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            bun run test
          else
            echo "No test script found, skipping test"
          fi

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: standalone-app
          path: .deploy
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read # This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: standalone-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F6100CEB3386471A88D19FA4A62C0916 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_985071827BE24AA7A0A8B0661C07F034 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FC46891283124987BD3EFF39313546FC }}

      - name: Configure environment variables in Azure
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_RENTVAGO_WHATSAPP_NUMBER: ${{ secrets.NEXT_PUBLIC_RENTVAGO_WHATSAPP_NUMBER }}
          NODE_ENV: production
        run: |
          az webapp config appsettings set \
            --resource-group RenVago \
            --name rentvago \
            --settings \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              DIRECT_URL="${{ secrets.DIRECT_URL }}" \
              JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              APIFY_API_TOKEN="${{ secrets.APIFY_API_TOKEN }}" \
              GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
              NEXT_PUBLIC_APP_URL="${{ secrets.NEXT_PUBLIC_APP_URL }}" \
              NEXT_PUBLIC_RENTVAGO_WHATSAPP_NUMBER="${{ secrets.NEXT_PUBLIC_RENTVAGO_WHATSAPP_NUMBER }}" \
              NODE_ENV="production"

      - name: Set startup command
        run: |
          az webapp config set \
            --resource-group RenVago \
            --name rentvago \
            --startup-file "node server.js"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: rentvago
          slot-name: Production
          package: .
